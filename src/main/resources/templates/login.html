<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- TU CSS ORIGINAL -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <img th:src="@{/images/logo.png}" alt="Logo KinalApp" class="hero-logo-img"
                 onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'bi bi-lightning-charge-fill\'></i>'">
            <h2>KinalApp</h2>
            <p class="text-muted">Sistema de Gestión Integral</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger alert-custom">
            <i class="bi bi-exclamation-triangle-fill"></i> Usuario o contraseña incorrectos
        </div>
        <div th:if="${param.logout}" class="alert alert-success alert-custom">
            <i class="bi bi-check-circle-fill"></i> Sesión cerrada correctamente
        </div>

        <form th:action="@{/vista/login}" method="post">
            <div class="input-group-custom">
                <label><i class="bi bi-person"></i> Usuario</label>
                <input type="text" name="username" placeholder="Ingresa tu usuario" required autofocus>
            </div>
            <div class="input-group-custom">
                <label><i class="bi bi-key"></i> Contraseña</label>
                <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </button>
        </form>

        <div class="register-link">
            <p>¿No tienes cuenta? <a href="/vista/register">Regístrate aquí</a></p>
        </div>

    </div>
</div>
</body>
</html>
