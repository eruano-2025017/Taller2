<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-bg);
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(115, 217, 207, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-2xl);
            z-index: 1;
            animation: fadeInUp 0.6s ease;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo i {
            font-size: 4rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .login-logo h2 {
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .input-group-custom {
            margin-bottom: 20px;
        }
        .input-group-custom label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-dark);
            display: block;
        }
        .input-group-custom input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        .input-group-custom input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(115, 217, 207, 0.2);
            outline: none;
        }
        .btn-login {
            background: var(--gradient-primary);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 10px;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        .alert-custom {
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-lightning-charge-fill"></i>
            <h2>KinalApp</h2>
            <p class="text-muted">Sistema de Gestión Integral</p>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-custom">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        </div>

        <div th:if="${mensaje}" class="alert alert-success alert-custom">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${mensaje}"></span>
        </div>

        <form th:action="@{/vista/login}" method="post">
            <div class="input-group-custom">
                <label><i class="bi bi-person"></i> Usuario</label>
                <input type="text" name="username" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="input-group-custom">
                <label><i class="bi bi-key"></i> Contraseña</label>
                <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </button>
        </form>

        <div class="register-link">
            <p>¿No tienes cuenta? <a href="/vista/register" class="text-decoration-none" style="color: var(--accent-dark);">Regístrate aquí</a></p>
        </div>
    </div>
</div>
</body>
</html>
