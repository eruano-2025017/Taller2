<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${accion} + ' - KinalApp'">Formulario Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .form-card { animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container">
        <a class="navbar-brand" href="/vista/"><i class="bi bi-lightning-charge-fill"></i> KinalApp</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vista/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/clientes">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/usuarios">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/ventas">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/detalleVentas">Detalle</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card form-card">
                <div class="card-header bg-warning">
                    <h4><i class="bi bi-cart-plus"></i> <span th:text="${accion}"></span></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/vista/ventas/guardar}" method="post">
                        <input type="hidden" name="codigoVenta" th:value="${venta.CODIGOVenta}">

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-calendar"></i> Fecha Venta *</label>
                            <input type="date" name="fechaVenta" class="form-control"
                                   th:value="${venta.fechaVenta}" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-cash-stack"></i> Total *</label>
                            <input type="number" step="0.01" name="total" class="form-control"
                                   th:value="${venta.total}" required placeholder="0.00">
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-person"></i> Cliente *</label>
                            <select name="clienteDpiCliente" class="form-control" required>
                                <option value="">-- Seleccione un cliente --</option>
                                <option th:each="cliente : ${clientes}"
                                        th:value="${cliente.dpiCliente}"
                                        th:text="${cliente.nombreCliente} + ' ' + ${cliente.apellidoCliente}"
                                        th:selected="${venta.cliente != null and venta.cliente.dpiCliente == cliente.dpiCliente}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-person-badge"></i> Usuario *</label>
                            <select name="usuarioCodigoUsuario" class="form-control" required>
                                <option value="">-- Seleccione un usuario --</option>
                                <option th:each="usuario : ${usuarios}"
                                        th:value="${usuario.CODIGOUsuario}"
                                        th:text="${usuario.username}"
                                        th:selected="${venta.usuario != null and venta.usuario.CODIGOUsuario == usuario.CODIGOUsuario}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
                            <select name="estado" class="form-control">
                                <option value="1" th:selected="${venta.estado == 1}">ACTIVA</option>
                                <option value="0" th:selected="${venta.estado == 0}">INACTIVA</option>
                            </select>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-success flex-grow-1">
                                <i class="bi bi-save"></i> Guardar
                            </button>
                            <a href="/vista/ventas" class="btn btn-secondary flex-grow-1">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2024 KinalApp - Sistema de Gestión Integral PERRO</p>
    <small>Hecho con <i class="bi bi-heart-fill text-danger"></i> para tu negocio</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });
</script>
</body>
</html>
