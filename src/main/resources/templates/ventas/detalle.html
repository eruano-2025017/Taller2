<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/vista/"><i class="bi bi-shop"></i> KinalApp</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vista/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/clientes">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/usuarios">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/ventas">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/detalleVentas">Detalle Ventas</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-warning">
            <h3><i class="bi bi-receipt"></i> Detalle de Venta #<span th:text="${venta.codigoVenta}"></span></h3>
        </div>
        <div class="card-body">
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card"><div class="card-body"><h6><i class="bi bi-calendar"></i> Fecha</h6><p th:text="${venta.fechaVenta}">-</p></div></div>
                </div>
                <div class="col-md-4">
                    <div class="card"><div class="card-body"><h6><i class="bi bi-person"></i> Cliente</h6><p th:text="${venta.cliente.nombreCliente} + ' ' + ${venta.cliente.apellidoCliente}">-</p></div></div>
                </div>
                <div class="col-md-4">
                    <div class="card" style="background: var(--primary); color: white;"><div class="card-body"><h6><i class="bi bi-cash"></i> Total</h6><h3 th:text="'Q' + ${venta.total}">-</h3></div></div>
                </div>
            </div>
            <h5><i class="bi bi-box-seam"></i> Productos</h5>
            <table class="table table-hover">
                <thead class="table-dark"><tr><th>Producto</th><th>Cantidad</th><th>Precio Unitario</th><th>Subtotal</th></tr></thead>
                <tbody>
                <tr th:each="detalle : ${detalles}"><td th:text="${detalle.producto.nombreProducto}">-</td><td th:text="${detalle.cantidad}">-</td><td th:text="'Q' + ${detalle.precioUnitario}">-</td><td th:text="'Q' + ${detalle.subTotal}">-</td></tr>
                <tr th:if="${detalles.empty}"><td colspan="4" class="text-center">No hay productos en esta venta</td></tr>
                </tbody>
            </table>
            <div class="mt-3"><a href="/vista/ventas" class="btn btn-secondary">Volver</a></div>
        </div>
    </div>
</div>
<footer class="footer"><p>&copy; 2024 KinalApp</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
