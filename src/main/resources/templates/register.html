<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp - Registrarse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-bg);
            position: relative;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-2xl);
            animation: fadeInUp 0.6s ease;
        }
        .btn-register {
            background: var(--gradient-primary);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
        }
        .input-group-custom {
            margin-bottom: 20px;
        }
        .input-group-custom label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-dark);
            display: block;
        }
        .input-group-custom input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        .input-group-custom input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(115, 217, 207, 0.2);
            outline: none;
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-card">
        <div class="login-logo text-center mb-4">
            <i class="bi bi-person-plus-fill" style="font-size: 3rem; background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; color: transparent;"></i>
            <h2 style="background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; color: transparent;">Crear Cuenta</h2>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/vista/register}" method="post">
            <div class="input-group-custom">
                <label><i class="bi bi-person"></i> Usuario</label>
                <input type="text" name="username" placeholder="Elige un nombre de usuario" required>
            </div>
            <div class="input-group-custom">
                <label><i class="bi bi-envelope"></i> Correo Electrónico</label>
                <input type="email" name="email" placeholder="tu@email.com" required>
            </div>
            <div class="input-group-custom">
                <label><i class="bi bi-key"></i> Contraseña</label>
                <input type="password" name="password" placeholder="Crea una contraseña" required>
            </div>
            <div class="input-group-custom">
                <label><i class="bi bi-shield"></i> Rol</label>
                <select name="rol" class="form-control" style="padding: 14px 18px; border-radius: 16px; border: 2px solid #e9ecef;">
                    <option value="USER">Usuario Normal</option>
                    <option value="ADMIN">Administrador</option>
                </select>
            </div>
            <button type="submit" class="btn btn-register">
                <i class="bi bi-person-plus"></i> Registrarse
            </button>
        </form>

        <div class="text-center mt-3">
            <p>¿Ya tienes cuenta? <a href="/vista/login" class="text-decoration-none" style="color: var(--accent-dark);">Iniciar Sesión</a></p>
        </div>
    </div>
</div>
</body>
</html>
