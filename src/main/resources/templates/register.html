<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KinalApp - Registrarse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <img th:src="@{/images/logo.png}" alt="Logo KinalApp" class="hero-logo-img"
                 onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'bi bi-lightning-charge-fill\'></i>'">
            <h2>Crear Cuenta</h2>
            <p class="text-muted">Regístrate para acceder al sistema</p>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-custom">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/vista/register}" method="post">
            <div class="input-group-custom">
                <label><i class="bi bi-person"></i> Usuario</label>
                <input type="text" name="username" placeholder="Elige un nombre de usuario" required>
            </div>
            <div class="input-group-custom">
                <label><i class="bi bi-envelope"></i> Correo Electrónico</label>
                <input type="email" name="email" placeholder="tu@email.com" required>
            </div>
            <div class="input-group-custom">
                <label><i class="bi bi-key"></i> Contraseña</label>
                <input type="password" name="password" placeholder="Crea una contraseña" required>
            </div>
            <div class="input-group-custom">
                <label><i class="bi bi-shield"></i> Rol</label>
                <select name="rol" class="form-control">
                    <option value="USER">Usuario Normal</option>
                    <option value="ADMIN">Administrador</option>
                </select>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <button type="submit" class="btn-login">
                <i class="bi bi-person-plus"></i> Registrarse
            </button>
        </form>

        <div class="register-link">
            <p>¿Ya tienes cuenta? <a href="/vista/login">Iniciar Sesión</a></p>
        </div>
    </div>
</div>
</body>
</html>
