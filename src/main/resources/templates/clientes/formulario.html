<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${accion}">Formulario Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container">
        <a class="navbar-brand" href="/vista/"><i class="bi bi-lightning-charge-fill"></i> KinalApp</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vista/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/clientes">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/usuarios">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/ventas">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/detalleVentas">Detalle</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4><i class="bi bi-person-badge"></i> <span th:text="${accion}"></span></h4>
                </div>
                <div class="card-body">
                    <form id="clienteForm" th:action="@{/vista/clientes/guardar}" method="post">
                        <input type="hidden" name="dpiClienteOriginal" th:value="${cliente.dpiCliente}">

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-card-text"></i> DPI *</label>
                            <input type="text" name="dpiCliente" class="form-control"
                                   th:value="${cliente.dpiCliente}" required
                                   th:readonly="${cliente.dpiCliente != null}"
                                   pattern="[0-9]+"
                                   maxlength="13"
                                   title="Ingrese solo números, sin espacios ni guiones"
                                   placeholder="Ejemplo: 1234567890101">
                            <small class="text-muted" th:if="${cliente.dpiCliente != null}">El DPI no se puede modificar</small>
                            <small class="text-muted" th:unless="${cliente.dpiCliente != null}">Ingrese solo números, sin espacios ni guiones</small>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-person"></i> Nombre *</label>
                            <input type="text" name="nombreCliente" class="form-control"
                                   th:value="${cliente.nombreCliente}" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-person"></i> Apellido *</label>
                            <input type="text" name="apellidoCliente" class="form-control"
                                   th:value="${cliente.apellidoCliente}" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-geo-alt"></i> Dirección *</label>
                            <input type="text" name="direccion" class="form-control"
                                   th:value="${cliente.direccion}" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
                            <select name="estado" class="form-control">
                                <option value="1" th:selected="${cliente.estado == 1}">ACTIVO</option>
                                <option value="0" th:selected="${cliente.estado == 0}">INACTIVO</option>
                            </select>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-success flex-grow-1">
                                <i class="bi bi-save"></i> Guardar
                            </button>
                            <a href="/vista/clientes" class="btn btn-secondary flex-grow-1">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2026 KinalApp - Sistema de Gestion Ventas</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Limpiar el campo DPI antes de enviar
    const clienteForm = document.getElementById('clienteForm');
    if (clienteForm) {
        clienteForm.addEventListener('submit', function(e) {
            const dpiInput = document.querySelector('input[name="dpiCliente"]');
            if (dpiInput && !dpiInput.readOnly) {
                // Eliminar comas, puntos, guiones, espacios y cualquier caracter no numérico
                let valorLimpio = dpiInput.value.replace(/[^0-9]/g, '');
                dpiInput.value = valorLimpio;

                // Validar que tenga al menos 1 dígito
                if (valorLimpio.length === 0) {
                    alert('El DPI es obligatorio');
                    e.preventDefault();
                    return false;
                }
            }
        });
    }

    // Validar mientras el usuario escribe (solo números)
    const dpiField = document.querySelector('input[name="dpiCliente"]');
    if (dpiField && !dpiField.readOnly) {
        dpiField.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    }

    // Efecto scroll en navbar
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });
</script>
</body>
</html>
