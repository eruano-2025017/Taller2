<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${accion} + ' - KinalApp'">Formulario Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .form-card { animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container">
        <a class="navbar-brand" href="/vista/"><i class="bi bi-lightning-charge-fill"></i> KinalApp</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vista/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/clientes">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/usuarios">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/ventas">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/detalleVentas">Detalle</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card form-card">
                <div class="card-header bg-success">
                    <h4><i class="bi bi-box-seam"></i> <span th:text="${accion}"></span></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/vista/productos/guardar}" method="post">
                        <input type="hidden" name="codigoProducto" th:value="${producto.CODIGOProducto}">

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-tag"></i> Nombre Producto *</label>
                            <input type="text" name="nombreProducto" class="form-control"
                                   th:value="${producto.nombreProducto}" required
                                   placeholder="Ingrese el nombre del producto">
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-cash"></i> Precio *</label>
                            <input type="number" step="0.01" name="precio" class="form-control"
                                   th:value="${producto.precio}" required
                                   placeholder="0.00">
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-pie-chart"></i> Stock *</label>
                            <input type="number" name="stock" class="form-control"
                                   th:value="${producto.stock}" required
                                   placeholder="Cantidad en inventario">
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
                            <select name="estado" class="form-control">
                                <option value="1" th:selected="${producto.estado == 1}">ACTIVO</option>
                                <option value="0" th:selected="${producto.estado == 0}">INACTIVO</option>
                            </select>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-success flex-grow-1">
                                <i class="bi bi-save"></i> Guardar
                            </button>
                            <a href="/vista/productos" class="btn btn-secondary flex-grow-1">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2024 KinalApp - Sistema de Gestión Integral PERRO</p>
    <small>Hecho con <i class="bi bi-heart-fill text-danger"></i> para tu negocio</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });
</script>
</body>
</html>
