<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ver Producto - KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container">
        <a class="navbar-brand" href="/vista/"><i class="bi bi-lightning-charge-fill"></i> KinalApp</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vista/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/clientes">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/usuarios">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/ventas">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/detalleVentas">Detalle</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4><i class="bi bi-eye"></i> Detalles del Producto</h4>
                </div>
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="rounded-circle bg-success bg-opacity-10 d-inline-flex p-4">
                            <i class="bi bi-box-seam fs-1" style="color: var(--accent);"></i>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-upc-scan"></i> Código:</span>
                            <span th:text="${producto.CODIGOProducto}">-</span>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-tag"></i> Nombre:</span>
                            <span th:text="${producto.nombreProducto}">-</span>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-cash"></i> Precio:</span>
                            <span class="fw-bold fs-5" style="color: var(--accent);" th:text="'Q' + ${producto.precio}">-</span>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-pie-chart"></i> Stock:</span>
                            <span th:if="${producto.stock <= 5}" class="text-warning fw-bold">
                                    <i class="bi bi-exclamation-triangle"></i> <span th:text="${producto.stock}">-</span>
                                </span>
                            <span th:unless="${producto.stock <= 5}" th:text="${producto.stock}">-</span>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-toggle-on"></i> Estado:</span>
                            <span class="badge" th:class="${producto.estado == 1} ? 'badge-success' : 'badge-danger'"
                                  th:text="${producto.estado == 1} ? 'ACTIVO' : 'INACTIVO'">
                                </span>
                        </div>
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <a th:href="@{/vista/productos/editar/{codigo}(codigo=${producto.CODIGOProducto})}"
                           class="btn btn-primary flex-grow-1">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a href="/vista/productos" class="btn btn-secondary flex-grow-1">
                            <i class="bi bi-arrow-left"></i> Volver
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2024 KinalApp - Sistema de Gestión Integral PERRO</p>
    <small>Hecho con <i class="bi bi-heart-fill text-danger"></i> para tu negocio</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });
</script>
</body>
</html>
.
