<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuarios - KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container">
        <a class="navbar-brand" href="/vista/"><i class="bi bi-lightning-charge-fill"></i> KinalApp</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vista/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/clientes">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link active" href="/vista/usuarios">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/ventas">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/detalleVentas">Detalle</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${mensaje}" class="alert alert-dismissible fade show"
         th:class="${'alert alert-' + tipoMensaje}" role="alert">
        <i th:if="${tipoMensaje == 'success'}" class="bi bi-check-circle-fill"></i>
        <i th:if="${tipoMensaje == 'danger'}" class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header bg-info d-flex justify-content-between align-items-center">
            <h3><i class="bi bi-person-badge-fill"></i> Gestión de Usuarios</h3>
            <a href="/vista/usuarios/nuevo" class="btn btn-light pulse">
                <i class="bi bi-plus-circle"></i> Nuevo Usuario
            </a>
        </div>
        <div class="card-body">
            <div class="table-container">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td data-label="Código" th:text="${usuario.CODIGOUsuario}">-</td>
                        <td data-label="Username" th:text="${usuario.username}">-</td>
                        <td data-label="Email" th:text="${usuario.email}">-</td>
                        <td data-label="Rol">
                                    <span class="badge" th:class="${usuario.rol == 'ADMIN'} ? 'badge-warning' : 'badge-info'"
                                          th:text="${usuario.rol}">
                                    </span>
                        </td>
                        <td data-label="Estado">
                                    <span class="badge" th:class="${usuario.estado == 1} ? 'badge-success' : 'badge-danger'"
                                          th:text="${usuario.estado == 1} ? 'ACTIVO' : 'INACTIVO'">
                                    </span>
                        </td>
                        <td data-label="Acciones">
                            <div class="btn-group">
                                <a th:href="@{/vista/usuarios/ver/{codigo}(codigo=${usuario.CODIGOUsuario})}"
                                   class="btn btn-info btn-sm" title="Ver">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/vista/usuarios/editar/{codigo}(codigo=${usuario.CODIGOUsuario})}"
                                   class="btn btn-primary btn-sm" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/vista/usuarios/eliminar/{codigo}(codigo=${usuario.CODIGOUsuario})}"
                                   class="btn btn-danger btn-sm" title="Eliminar"
                                   onclick="return confirm('¿Estás seguro de eliminar este usuario?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${usuarios.empty}">
                        <td colspan="6" class="text-center py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-3" style="color: var(--gray);"></i>
                            No hay usuarios registrados
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="mt-3 text-center">
        <a href="/vista/" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Volver al Inicio
        </a>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2024 KinalApp - Sistema de Gestión Integral PERRO</p>
    <small>Hecho con <i class="bi bi-heart-fill text-danger"></i> para tu negocio</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });
</script>
</body>
</html>
.
