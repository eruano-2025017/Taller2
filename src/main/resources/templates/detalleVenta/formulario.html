<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${accion} + ' - KinalApp'">Formulario Detalle Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .form-card { animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container">
        <a class="navbar-brand" href="/vista/"><i class="bi bi-lightning-charge-fill"></i> KinalApp</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vista/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/clientes">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/usuarios">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/ventas">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/detalleVentas">Detalle</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card form-card">
                <div class="card-header bg-success">
                    <h4><i class="bi bi-cart-plus"></i> <span th:text="${accion}"></span></h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/vista/detalleVentas/guardar}" method="post">
                        <input type="hidden" name="codigoDetalleVenta" th:value="${detalleVenta.codigoDetalleVenta}">

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-receipt"></i> Seleccionar Venta *</label>
                            <select name="ventaCodigoVenta" class="form-control" required>
                                <option value="">-- Seleccione una venta --</option>
                                <option th:each="venta : ${ventas}"
                                        th:value="${venta.CODIGOVenta}"
                                        th:text="'Venta #' + ${venta.CODIGOVenta} + ' - ' + ${venta.cliente.nombreCliente} + ' - Q' + ${venta.total}"
                                        th:selected="${detalleVenta.venta != null and detalleVenta.venta.CODIGOVenta == venta.CODIGOVenta}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-box-seam"></i> Seleccionar Producto *</label>
                            <select name="productoCodigoProducto" id="productoSelect" class="form-control" required>
                                <option value="">-- Seleccione un producto --</option>
                                <option th:each="producto : ${productos}"
                                        th:value="${producto.CODIGOProducto}"
                                        th:text="${producto.nombreProducto} + ' - Stock: ' + ${producto.stock} + ' - Q' + ${producto.precio}"
                                        th:data-precio="${producto.precio}"
                                        th:selected="${detalleVenta.producto != null and detalleVenta.producto.CODIGOProducto == producto.CODIGOProducto}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-hash"></i> Cantidad *</label>
                            <input type="number" id="cantidad" name="cantidad" class="form-control"
                                   min="1" th:value="${detalleVenta.cantidad}" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-tag"></i> Precio Unitario *</label>
                            <input type="number" step="0.01" id="precioUnitario" name="precioUnitario"
                                   class="form-control" th:value="${detalleVenta.precioUnitario}" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="bi bi-calculator"></i> Subtotal</label>
                            <input type="number" step="0.01" id="subTotal" name="subTotal"
                                   class="form-control" th:value="${detalleVenta.subTotal}"
                                   placeholder="Se calcula automáticamente" readonly>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-success flex-grow-1">
                                <i class="bi bi-save"></i> Guardar
                            </button>
                            <a href="/vista/detalleVentas" class="btn btn-secondary flex-grow-1">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const productoSelect = document.getElementById('productoSelect');
    const cantidadInput = document.getElementById('cantidad');
    const precioInput = document.getElementById('precioUnitario');
    const subtotalInput = document.getElementById('subTotal');

    function actualizarPrecio() {
        const selectedOption = productoSelect.options[productoSelect.selectedIndex];
        const precio = selectedOption.getAttribute('data-precio');
        if (precio && !precioInput.value) {
            precioInput.value = parseFloat(precio).toFixed(2);
        }
        calcularSubtotal();
    }

    function calcularSubtotal() {
        const cantidad = parseFloat(cantidadInput.value) || 0;
        const precio = parseFloat(precioInput.value) || 0;
        subtotalInput.value = (cantidad * precio).toFixed(2);
    }

    productoSelect.addEventListener('change', actualizarPrecio);
    cantidadInput.addEventListener('input', calcularSubtotal);
    precioInput.addEventListener('input', calcularSubtotal);

    if (precioInput.value) calcularSubtotal();
</script>

<footer class="footer">
    <p>&copy; 2024 KinalApp - Sistema de Gestión Integral PERRO</p>
    <small>Hecho con <i class="bi bi-heart-fill text-danger"></i> para tu negocio</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });
</script>
</body>
</html>
