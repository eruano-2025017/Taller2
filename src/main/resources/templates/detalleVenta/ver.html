<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ver Detalle Venta - KinalApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg" id="navbar">
    <div class="container">
        <a class="navbar-brand" href="/vista/"><i class="bi bi-lightning-charge-fill"></i> KinalApp</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/vista/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/clientes">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/usuarios">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/ventas">Ventas</a></li>
                <li class="nav-item"><a class="nav-link" href="/vista/detalleVentas">Detalle</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4><i class="bi bi-eye"></i> Detalle de Venta</h4>
                </div>
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="rounded-circle bg-success bg-opacity-10 d-inline-flex p-4">
                            <i class="bi bi-receipt fs-1" style="color: var(--accent);"></i>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-upc-scan"></i> ID Detalle:</span>
                            <span th:text="${detalle.codigoDetalleVenta}">-</span>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-receipt"></i> Venta #:</span>
                            <a th:href="@{/vista/ventas/ver/{codigo}(codigo=${detalle.venta.CODIGOVenta})}"
                               class="btn btn-sm btn-info">
                                Ver Venta #<span th:text="${detalle.venta.CODIGOVenta}">-</span>
                            </a>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-box-seam"></i> Producto:</span>
                            <span th:text="${detalle.producto.nombreProducto}">-</span>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-hash"></i> Cantidad:</span>
                            <span class="badge" style="background: var(--primary);" th:text="${detalle.cantidad}">-</span>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-tag"></i> Precio Unitario:</span>
                            <span th:text="'Q' + ${detalle.precioUnitario}">-</span>
                        </div>
                    </div>
                    <div class="info-item mb-3 p-3 rounded" style="background: var(--light);">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold"><i class="bi bi-calculator"></i> Subtotal:</span>
                            <span class="fw-bold fs-5" style="color: var(--accent);" th:text="'Q' + ${detalle.subTotal}">-</span>
                        </div>
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <a th:href="@{/vista/detalleVentas/editar/{codigo}(codigo=${detalle.codigoDetalleVenta})}"
                           class="btn btn-primary flex-grow-1">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a href="/vista/detalleVentas" class="btn btn-secondary flex-grow-1">
                            <i class="bi bi-arrow-left"></i> Volver
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2024 KinalApp - Sistema de Gestión Integral PERRO</p>
    <small>Hecho con <i class="bi bi-heart-fill text-danger"></i> para tu negocio</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });
</script>
</body>
</html>
.
